# Copy this file to config.toml and adjust for your environment.
# Add your targets below or use `vulu discover` to find them automatically.

[common]
ssh_key_path = "~/.ssh/id_ed25519"
known_hosts_path = "~/.ssh/known_hosts"
ssh_timeout_seconds = 30
command_timeout_seconds = 60
max_connections = 10
cve_requests_per_second = 50

